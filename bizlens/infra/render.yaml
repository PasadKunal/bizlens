# Render.com blueprint for BizLens.
services:
  - type: web
    name: bizlens-api
    runtime: docker
    dockerfilePath: ./bizlens/infra/Dockerfile
    dockerCommand: uvicorn bizlens.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bizlens-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: bizlens-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: redis
    name: bizlens-redis
    ipAllowList: []
    plan: free

databases:
  - name: bizlens-db
    plan: free
